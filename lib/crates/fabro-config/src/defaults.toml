# Fabro built-in defaults — embedded at compile time.
# Dynamic and presence-gated defaults remain in Rust.
_version = 1

[workflow]
graph = "workflow.fabro"

[run.execution]
mode = "normal"
approval = "prompt"

[run.prepare]
timeout = "5m"

[run.clone]
enabled = true

[run.run_branch]
enabled = true
push = true

[run.meta_branch]
enabled = true
push = true

[run.environment]
id = "default"

[environments.default]
provider = "docker"

[environments.default.image]
docker = "buildpack-deps:noble"

[environments.default.resources]
cpu = 2
memory = "4GB"

[environments.default.lifecycle]
preserve = false
stop_on_terminal = true

[environments.local]
provider = "local"

[environments.docker]
provider = "docker"

[environments.docker.image]
docker = "buildpack-deps:noble"

[environments.docker.resources]
cpu = 2
memory = "4GB"

[environments.docker.lifecycle]
preserve = false
stop_on_terminal = true

[environments.daytona]
provider = "daytona"

[cli.output]
format = "text"
verbosity = "normal"

[cli.exec]
prevent_idle_sleep = false

[cli.updates]
check = true

[server.web]
enabled = true
url = "http://localhost:3000"

[server.scheduler]
max_concurrent_runs = 5

[server.artifacts]
provider = "local"
prefix = ""

[server.slatedb]
provider = "local"
prefix = ""
flush_interval = "1ms"
disk_cache = false
