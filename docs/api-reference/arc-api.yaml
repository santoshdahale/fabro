    # ── Session Schemas ─────────────────────────────────────────────────

    SessionListItem:
      description: Summary of a session shown in list views.
      type: object
      required:
        - id
        - title
        - created_at
      properties:
        id:
          type: string
          description: Unique session identifier.
          example: s1
        title:
          type: string
          description: Short title summarizing the session topic.
          example: Add rate limiting to auth endpoints
        created_at:
          type: string
          description: ISO 8601 timestamp when the session was created.
          example: "2026-03-06T14:30:00Z"

    SessionGroup:
      description: A group of sessions sharing a time-based label (e.g. "Today", "Yesterday").
      type: object
      required:
        - label
        - sessions
      properties:
        label:
          type: string
          description: Human-readable group heading.
          example: Today
        sessions:
          type: array
          description: Sessions belonging to this group, ordered by recency.
          items:
            $ref: "#/components/schemas/SessionListItem"

    SessionTurn:
      description: A single turn in a session conversation — a user message, assistant response, or tool invocation block.
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          description: The type of turn.
          enum:
            - user
            - assistant
            - tool
          example: user
        content:
          type: string
          description: Text content of the turn. Present for user and assistant turns, absent for tool turns.
          example: Add rate limiting to the auth endpoints using a sliding window approach with Redis.
        created_at:
          type: string
          description: ISO 8601 timestamp when the turn was created. Typically present for user turns.
          example: "2026-02-28T10:00:00Z"
        tools:
          type: array
          description: Tool invocations for this turn. Present only when kind is "tool".
          items:
            $ref: "#/components/schemas/ToolUse"

    SessionDetail:
      description: Full session record including metadata and the complete conversation history.
      type: object
      required:
        - id
        - title
        - model
        - created_at
        - updated_at
        - turns
      properties:
        id:
          type: string
          description: Unique session identifier.
          example: s1
        title:
          type: string
          description: Short title summarizing the session topic.
          example: Add rate limiting to auth endpoints
        model:
          type: string
          description: The LLM model used for this session.
          example: Opus 4.6
        created_at:
          type: string
          description: ISO 8601 timestamp when the session was created.
          example: "2026-03-06T14:30:00Z"
        updated_at:
          type: string
          description: ISO 8601 timestamp when the session was last updated (e.g. new turn added).
          example: "2026-03-06T15:45:00Z"
        turns:
          type: array
          description: Ordered list of conversation turns.
          items:
            $ref: "#/components/schemas/SessionTurn"

    CreateSessionRequest:
      description: Request body for starting a new session.
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: The initial user message to start the session.
          example: Add rate limiting to the auth endpoints using a sliding window approach with Redis, 10 requests per minute per IP.
        model:
          type: string
          description: LLM model to use. If omitted, the server default is used.
          example: Opus 4.6

    CreateSessionResponse:
      description: Response returned after successfully creating a session.
      type: object
      required:
        - id
        - created_at
      properties:
        id:
          type: string
          description: Unique identifier for the newly created session.
          example: s42
        created_at:
          type: string
          description: ISO 8601 timestamp when the session was created.
          example: "2026-03-06T16:00:00Z"

    SendMessageRequest:
      description: Request body for sending a follow-up message in an existing session.
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: The user message text.
          example: Can you also add a bypass for internal health-check IPs?

