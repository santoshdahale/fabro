<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1430" height="160" viewBox="0 0 1430 160" xmlns="http://www.w3.org/2000/svg">
<style>
  @media (prefers-color-scheme: dark) {
    [fill="#1a1a1a"] { fill: #e5e5e5; }
    [fill="#666666"] { fill: #aaaaaa; }
    [stroke="#666666"] { stroke: #aaaaaa; }
    [stroke="#999999"] { stroke: #777777; }
  }
</style>
<g>
  <!-- START (Mdiamond) at (40, 42) -->
  <polygon fill="none" stroke="#357f9e" points="40,24 5,42 40,60 75,42"/>
  <polyline fill="none" stroke="#357f9e" points="16,36 16,48"/>
  <polyline fill="none" stroke="#357f9e" points="28,54 52,54"/>
  <polyline fill="none" stroke="#357f9e" points="64,48 64,36"/>
  <polyline fill="none" stroke="#357f9e" points="52,30 28,30"/>
  <text xml:space="preserve" text-anchor="middle" x="40" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Start</text>

  <!-- TOOLCHAIN (parallelogram) at (155, 42) -->
  <polygon fill="none" stroke="#357f9e" points="122,24 208,24 188,60 102,60"/>
  <text xml:space="preserve" text-anchor="middle" x="155" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Toolchain</text>

  <!-- PREFLIGHT COMPILE (parallelogram) at (315, 42) -->
  <polygon fill="none" stroke="#357f9e" points="263,24 387,24 367,60 243,60"/>
  <text xml:space="preserve" text-anchor="middle" x="315" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Preflight Compile</text>

  <!-- PREFLIGHT LINT (parallelogram) at (475, 42) -->
  <polygon fill="none" stroke="#357f9e" points="433,24 537,24 517,60 413,60"/>
  <text xml:space="preserve" text-anchor="middle" x="475" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Preflight Lint</text>

  <!-- IMPLEMENT (ellipse) at (615, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="615" cy="42" rx="42" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="615" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Implement</text>

  <!-- SIMPLIFY OPUS (ellipse) at (755, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="755" cy="42" rx="55" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="755" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Simplify (Opus)</text>

  <!-- SIMPLIFY GEMINI (ellipse) at (910, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="910" cy="42" rx="60" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="910" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Simplify (Gemini)</text>

  <!-- SIMPLIFY GPT-54 (ellipse) at (1070, 42) -->
  <ellipse fill="none" stroke="#357f9e" cx="1070" cy="42" rx="60" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="1070" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Simplify (GPT-54)</text>

  <!-- VERIFY (parallelogram) at (1215, 42) -->
  <polygon fill="none" stroke="#357f9e" points="1193,24 1257,24 1237,60 1173,60"/>
  <text xml:space="preserve" text-anchor="middle" x="1215" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Verify</text>

  <!-- FORMAT (parallelogram) at (1330, 42) -->
  <polygon fill="none" stroke="#357f9e" points="1308,24 1372,24 1352,60 1288,60"/>
  <text xml:space="preserve" text-anchor="middle" x="1330" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Format</text>

  <!-- EXIT (Msquare) at (1400, 42) -->
  <polygon fill="none" stroke="#357f9e" points="1382,24 1418,24 1418,60 1382,60"/>
  <polyline fill="none" stroke="#357f9e" points="1394,24 1382,36"/>
  <polyline fill="none" stroke="#357f9e" points="1382,48 1394,60"/>
  <polyline fill="none" stroke="#357f9e" points="1406,60 1418,48"/>
  <polyline fill="none" stroke="#357f9e" points="1418,36 1406,24"/>
  <text xml:space="preserve" text-anchor="middle" x="1400" y="46" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Exit</text>

  <!-- FIX LINTS (ellipse) at (475, 125) -->
  <ellipse fill="none" stroke="#357f9e" cx="475" cy="125" rx="35" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="475" y="129" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Fix Lints</text>

  <!-- FIXUP (ellipse) at (1215, 125) -->
  <ellipse fill="none" stroke="#357f9e" cx="1215" cy="125" rx="28" ry="18"/>
  <text xml:space="preserve" text-anchor="middle" x="1215" y="129" font-family="Helvetica,sans-Serif" font-size="12.00" fill="#1a1a1a">Fixup</text>

  <!-- === FORWARD EDGES (main path) === -->

  <!-- start → toolchain -->
  <path fill="none" stroke="#666666" d="M75,42 L102,42"/>
  <polygon fill="#666666" stroke="#666666" points="102,38.5 112,42 102,45.5"/>

  <!-- toolchain → preflight compile -->
  <path fill="none" stroke="#666666" d="M198,42 L243,42"/>
  <polygon fill="#666666" stroke="#666666" points="243,38.5 253,42 243,45.5"/>

  <!-- preflight compile → preflight lint -->
  <path fill="none" stroke="#666666" d="M377,42 L413,42"/>
  <polygon fill="#666666" stroke="#666666" points="413,38.5 423,42 413,45.5"/>

  <!-- preflight lint → implement -->
  <path fill="none" stroke="#666666" d="M527,42 L563,42"/>
  <polygon fill="#666666" stroke="#666666" points="563,38.5 573,42 563,45.5"/>

  <!-- implement → simplify opus -->
  <path fill="none" stroke="#666666" d="M657,42 L690,42"/>
  <polygon fill="#666666" stroke="#666666" points="690,38.5 700,42 690,45.5"/>

  <!-- simplify opus → simplify gemini -->
  <path fill="none" stroke="#666666" d="M810,42 L840,42"/>
  <polygon fill="#666666" stroke="#666666" points="840,38.5 850,42 840,45.5"/>

  <!-- simplify gemini → simplify gpt-54 -->
  <path fill="none" stroke="#666666" d="M970,42 L1000,42"/>
  <polygon fill="#666666" stroke="#666666" points="1000,38.5 1010,42 1000,45.5"/>

  <!-- simplify gpt-54 → verify -->
  <path fill="none" stroke="#666666" d="M1130,42 L1163,42"/>
  <polygon fill="#666666" stroke="#666666" points="1163,38.5 1173,42 1163,45.5"/>

  <!-- verify → format -->
  <path fill="none" stroke="#666666" d="M1247,42 L1278,42"/>
  <polygon fill="#666666" stroke="#666666" points="1278,38.5 1288,42 1278,45.5"/>

  <!-- format → exit -->
  <path fill="none" stroke="#666666" d="M1362,42 L1372,42"/>
  <polygon fill="#666666" stroke="#666666" points="1372,38.5 1382,42 1372,45.5"/>

  <!-- === FAIL STUBS (toolchain, preflight compile → exit on failure) === -->

  <!-- toolchain → exit [Fail] -->
  <path fill="none" stroke="#999999" stroke-dasharray="5,3" d="M155,60 L155,80"/>
  <polygon fill="#999999" stroke="#999999" points="151.5,74 155,84 158.5,74"/>
  <text xml:space="preserve" text-anchor="start" x="163" y="78" font-family="Helvetica,sans-Serif" font-size="9.00" fill="#999999">Exit</text>

  <!-- preflight compile → exit [Fail] -->
  <path fill="none" stroke="#999999" stroke-dasharray="5,3" d="M315,60 L315,80"/>
  <polygon fill="#999999" stroke="#999999" points="311.5,74 315,84 318.5,74"/>
  <text xml:space="preserve" text-anchor="start" x="323" y="78" font-family="Helvetica,sans-Serif" font-size="9.00" fill="#999999">Exit</text>

  <!-- === LINT RETRY LOOP === -->

  <!-- preflight lint → fix lints [Fail] -->
  <path fill="none" stroke="#666666" d="M490,60 L490,97"/>
  <polygon fill="#666666" stroke="#666666" points="486.5,97 490,107 493.5,97"/>
  <text xml:space="preserve" text-anchor="start" x="496" y="86" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Fail</text>

  <!-- fix lints → preflight lint (backward curve, left side) -->
  <path fill="none" stroke="#666666" d="M440,118 C390,115 390,48 423,42"/>
  <polygon fill="#666666" stroke="#666666" points="417,46 425,40 421,48"/>

  <!-- === VERIFY RETRY LOOP === -->

  <!-- verify → fixup [Fail] -->
  <path fill="none" stroke="#666666" d="M1230,60 L1230,97"/>
  <polygon fill="#666666" stroke="#666666" points="1226.5,97 1230,107 1233.5,97"/>
  <text xml:space="preserve" text-anchor="start" x="1236" y="86" font-family="Helvetica,sans-Serif" font-size="10.00" fill="#666666">Fail</text>

  <!-- fixup → verify (backward curve, left side) -->
  <path fill="none" stroke="#666666" d="M1187,118 C1145,115 1145,48 1173,42"/>
  <polygon fill="#666666" stroke="#666666" points="1167,46 1175,40 1171,48"/>
</g>
</svg>
